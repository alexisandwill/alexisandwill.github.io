<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexis & Will | 10.24.27</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root { 
            --text-color: #CACD78; 
            --hover-bg: #CACD78;
            --hover-text: #0f1c08;
        }
        
        body { 
            /* Added a dark, semi-transparent overlay to keep the text legible against the painting */
            background: linear-gradient(rgba(15, 28, 8, 0.5), rgba(27, 51, 16, 0.6)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/a/a4/Monet_-_Jardin_des_Tuileries_-1875.jpg?_=20090701093748') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color); 
            font-family: 'Futura', 'Trebuchet MS', Arial, sans-serif;
            overflow: hidden;
            cursor: crosshair;
            touch-action: none; 
        }
        
        #garden-floor {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .info-container {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .hero-text {
            font-family: 'Pinyon Script', cursive;
            line-height: 0.9;
            font-weight: 400;
        }

        .planted-flower {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: drift 8s infinite ease-in-out;
            transform-origin: center;
            margin-left: -20px;
            margin-top: -20px;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            50% { transform: translate(10px, -15px) rotate(10deg); }
        }

        .grain {
            position: fixed;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            opacity: 0.05;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        .calendar-btn {
            pointer-events: auto;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
            backdrop-filter: blur(4px);
        }
        
        .calendar-btn:hover {
            background-color: var(--hover-bg);
            color: var(--hover-text);
            border-color: var(--hover-bg);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="grain"></div>
    <div id="garden-floor"></div>

    <main class="info-container text-center select-none w-full px-4">
        
        <div class="mb-6 inline-block px-4 py-1 border border-[#CACD78]/30 rounded-full text-[10px] font-light tracking-[0.4em] uppercase opacity-70">
            Save the Date
        </div>

        <h1 class="hero-text text-[24vw] md:text-[12vw] text-center filter drop-shadow-lg">
            Alexis <span class="text-[14vw] md:text-[6vw] opacity-40 italic">&</span> Will
        </h1>

        <div class="mt-8 md:mt-12 space-y-2">
             <p class="text-lg md:text-2xl font-light tracking-[0.3em] uppercase text-white/80">
                OCTOBER 24, 2027
            </p>
            <p class="text-lg md:text-2xl font-light tracking-[0.3em] uppercase text-white/80 md:whitespace-nowrap">
                Ethereal Gardens, Escondido, CA
            </p>
        </div>

        <div class="mt-12">
            <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Alexis+%26+Will%27s+Wedding&dates=20271024/20271025&location=Ethereal+Gardens,+Escondido,+CA" 
               target="_blank" 
               class="calendar-btn inline-block px-12 py-4 bg-[#CACD78]/10 border border-[#CACD78]/40 rounded-full text-xs font-medium text-[#CACD78] tracking-[0.3em] uppercase">
                Add to Calendar
            </a>
        </div>

        <div class="mt-20 pointer-events-auto">
            <p class="text-[10px] font-light uppercase tracking-[0.5em] text-white/80 cursor-pointer">
                Tap to plant a flower
            </p>
        </div>
    </main>

    <script>
        const floor = document.getElementById('garden-floor');
        const flowers = ['🌸', '🌼', '🌷', '🌿', '🌱', '✨'];

        function plantFlower(e) {
            if (e.target.closest('.calendar-btn')) return;

            const char = e.touches ? e.touches[0] : e;
            const flower = document.createElement('div');
            const type = flowers[Math.floor(Math.random() * flowers.length)];
            
            flower.innerHTML = type;
            flower.className = 'planted-flower text-4xl md:text-6xl';
            flower.style.left = char.pageX + 'px';
            flower.style.top = char.pageY + 'px';
            
            flower.style.transform = 'scale(0) rotate(-45deg)';
            flower.style.opacity = '0';
            
            floor.appendChild(flower);

            setTimeout(() => {
                const scale = 0.5 + Math.random() * 1.2;
                const rotate = (Math.random() - 0.5) * 60;
                flower.style.transform = `scale(${scale}) rotate(${rotate}deg)`;
                flower.style.opacity = '0.8';
            }, 50);
        }

        document.addEventListener('mousedown', plantFlower);
        document.addEventListener('touchstart', (e) => {
            plantFlower(e);
        }, { passive: false });
    </script>
</body>
</html>
