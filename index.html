<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexis & Will's Wedding | 10.24.27</title>
  <link rel="icon" type="image/x-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-size='32'>🌸</text></svg>">
  <link rel="preload" as="image" href="greencard.png" fetchpriority="high">
  <style>
    body {
      background-color: #FFF; /* #93A75C */
      margin: 0;
      padding: 40px; 
      box-sizing: border-box; 
      display: flex;
      flex-direction: column; 
      justify-content: center;
      align-items: center;
      gap: 20px; 
      height: 100vh; 
      overflow: hidden; 
      font-family: 'IBM Plex Mono', monospace;
      
      /* Flower emoji cursor for the whole page */
      cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 48 48'><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-size='36'>🌸</text></svg>") 24 24, auto;
      
      position: relative;
    }

    .centered-image {
      max-width: 100%; 
      height: auto; 
      max-height: calc(100vh - 180px); 
      z-index: 10; 
    }

    .calendar-btn {
      padding: 14px 32px;
      border: 1px solid #606F44; 
      background-color: transparent; 
      color: #606F44; 
      
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 12px;
      border-radius: 40px; 
      transition: all 0.3s ease; 
      flex-shrink: 0; 
      z-index: 10; 
      
      /* Keep the flower emoji cursor when hovering over the button */
      cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 48 48'><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-size='36'>🌸</text></svg>") 24 24, pointer; 
    }

    .calendar-btn:hover {
      background-color: #606F44; 
      color: #ffffff; 
    }

    .tertiary-text {
      font-size: 11px; 
      color: #8c998c; /* Slightly tinted the grey to match the green background better */
      text-transform: uppercase; 
      margin: 0; 
      margin-top: -8px; 
      letter-spacing: 0.1em; 
      text-align: center;
      z-index: 10;
      pointer-events: none; 
    }

    .planted-flower {
      position: absolute;
      pointer-events: none; 
      font-size: 36px; 
      transform: translate(-50%, -50%);
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    img {
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }

  img.loaded {
    opacity: 1;
  }
  </style>
</head>
<body>
  
  <img src="greencard.webp" alt="Alexis & Will Save the Date" class="centered-image" onload="this.classList.add('loaded')">
  
  <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=🌸+Alexis+%26+Will%27s+Wedding+🌸&dates=20271024/20271025&location=Ethereal+Gardens,+Escondido,+CA" 
     target="_blank" 
     class="calendar-btn">
    <b>Add to Calendar</b>
  </a>

  <p class="tertiary-text">Invitation and details to follow<br><br>Click to Plant Flowers on the Screen</p>

  <script>
    document.addEventListener('click', function(e) {
      if (e.target !== document.body) return;

      const flower = document.createElement('div');
      flower.classList.add('planted-flower');
      
      const flowers = ['🌸', '🌺', '🌷', '🌼', '🪷', '✨'];
      flower.innerText = flowers[Math.floor(Math.random() * flowers.length)];
      
      flower.style.left = e.pageX + 'px';
      flower.style.top = e.pageY + 'px';
      
      document.body.appendChild(flower);
    });
  </script>

</body>
</html>
