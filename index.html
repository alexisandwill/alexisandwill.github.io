    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root { 
            --text-color: #CACD78; 
            --hover-bg: #CACD78;
            --hover-text: #0f1c08;
        }
        
        body { 
            background: linear-gradient(rgba(15, 28, 8, 0.5), rgba(27, 51, 16, 0.6)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/a/a4/Monet_-_Jardin_des_Tuileries_-1875.jpg?_=20090701093748') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color); 
            font-family: 'Futura', 'Trebuchet MS', Arial, sans-serif;
            min-height: 100vh;
            cursor: crosshair;
            overflow-x: hidden;
        }
        
        #garden-floor {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .info-container {
            position: relative;
            z-index: 10;
            pointer-events: none;
            padding: 4rem 1rem;
        }

        .hero-text {
            font-family: 'Pinyon Script', cursive;
            line-height: 0.9;
            font-weight: 400;
        }

        /* Carousel Styles */
        .carousel-container {
            pointer-events: auto;
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 4 / 5;
            margin: 2rem auto;
            overflow: hidden;
            border-radius: 4px;
            border: 1px solid rgba(202, 205, 120, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .carousel-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .carousel-slide.active {
            opacity: 1;
        }

        .planted-flower {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: drift 8s infinite ease-in-out;
            transform-origin: center;
            margin-left: -20px;
            margin-top: -20px;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            50% { transform: translate(10px, -15px) rotate(10deg); }
        }

        .grain {
            position: fixed;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            opacity: 0.05;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        .calendar-btn {
            pointer-events: auto;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
            backdrop-filter: blur(4px);
        }
        
        .calendar-btn:hover {
            background-color: var(--hover-bg);
            color: var(--hover-text);
            border-color: var(--hover-bg);
        }
    </style>
</head>
