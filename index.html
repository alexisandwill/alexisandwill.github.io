<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexis & Will | 10.24.27</title>
  <style>
    body {
      background-color: white;
      margin: 0;
      padding: 40px; 
      box-sizing: border-box; 
      display: flex;
      flex-direction: column; /* Stacks the image and button vertically */
      justify-content: center;
      align-items: center;
      gap: 24px; /* Adds space between the image and the button */
      height: 100vh; 
      overflow: hidden; 
      font-family: 'Futura', 'Trebuchet MS', Arial, sans-serif;
    }

    .centered-image {
      max-width: 100%; 
      height: 100%; /* Tells the image to take up the remaining space */
      min-height: 0; /* Allows the image to shrink so the button fits */
      object-fit: contain; 
    }

    /* Styling for the Add to Calendar button */
    .calendar-btn {
      padding: 14px 32px;
      /* Modified: add border and change colors for outline button */
      border: 1px solid #1a1a1a; /* add a dark outline */
      background-color: transparent; /* no fill (transparent) */
      color: #1a1a1a; /* change text color to match border/dark theme */
      
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 12px;
      border-radius: 40px; /* Pill shape */
      transition: all 0.3s ease; /* smoothly transition all style changes */
      flex-shrink: 0; /* Prevents the button itself from shrinking */
    }

    /* Modified hover state: make it solid dark with white text, just like original, but as inversion */
    .calendar-btn:hover {
      background-color: #1a1a1a; /* make solid fill on hover */
      color: #ffffff; /* change text to white on hover */
      /* opacity: 0.7; - I've removed the fading for solid hover as inversion is clearer, but you can put it back if preferred */
    }
  </style>
</head>
<body>
  
  <img src="card.png" alt="Alexis & Will Save the Date" class="centered-image">
  
  <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Alexis+%26+Will%27s+Wedding&dates=20271024/20271025&location=Ethereal+Gardens,+Escondido,+CA" 
     target="_blank" 
     class="calendar-btn">
    Add to Calendar
  </a>

</body>
</html>
